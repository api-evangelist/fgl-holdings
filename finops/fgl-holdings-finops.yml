description: FOCUS-aligned FinOps stub for FGL Holdings / F&G Annuities & Life. No public developer API
  exists; carrier integrations are agent/IMO channel via DTCC, IRI, and proprietary distribution portals.
  API-FinOps is therefore N/A; commercial flows are commission/policy economics, not API consumption.
notes: No public API; FinOps lives in the policy administration / commission system. Retained as a stub.
