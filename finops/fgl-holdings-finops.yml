principles:
  - name: Visibility
    description: Not applicable to API consumption; visibility lives in the policy administration / commission
      system used by the IMO.
  - name: Allocation
    description: Allocation is at the policy / agent / IMO level in the carrier's policy admin system,
      not via API meters.
  - name: Optimization
    description: Optimization is product / commission design, not API engineering.
  - name: Accountability
    description: Distribution / IMO relationship management owns the partner relationship; no API budget
      owner exists.
