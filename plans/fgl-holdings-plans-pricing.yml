description: FGL Holdings (Fidelity & Guaranty Life) is the parent of F&G Annuities & Life, an insurance
  carrier issuing fixed and indexed annuities and life insurance through agents and IMOs. There is no
  public developer API or developer portal for FGL Holdings or F&G; integrations with the carrier are
  bilateral via DTCC, IRI, or proprietary IMO portals (e.g. F&G Producer Site / SaleSmart). The api.fglife.com
  scaffold endpoint is not a publicly documented interface.
notes: No public developer API or pricing. F&G Annuities & Life integrations are agent/IMO-channel via
  industry consortia (DTCC IPS, IRI ACORD), not a self-service API. The plans scaffold has been retained
  as a stub.
sources:
  - https://www.fglife.com/
  - https://fnf.com/ (parent — Fidelity National Financial)
plans:
  - id: fgl-holdings-no-public-api
    name: No Public API
    type: enterprise
    description: F&G integrates with distribution partners via DTCC, IRI, and proprietary IMO portals
      under bilateral agreements; there is no self-service developer API.
    entries:
      - label: Distribution partner integration
        description: Bilateral integration via DTCC IPS, IRI ACORD, or F&G Producer Site under partner
          agreement.
        name: distribution_integration
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: US
        unit: 1
        price: contact carrier / IMO
        userMultiplied: false
    elements:
      - name: DTCC Insurance Processing Service (IPS)
      - name: IRI / ACORD standards
      - name: F&G Producer Site
      - name: 'Status: no public developer API'
